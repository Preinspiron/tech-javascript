<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Casino</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #predict {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="predict"></div>
    <script type="application/javascript">
      (function () {
        var base = '{offer}';
        // var base = 'https://betfm.cc';
        var src = base + (window.location.search || '');
        var srcAttr = src.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        document.getElementById('predict').innerHTML =
          '<iframe frameborder="0" width="100%" height="100%" src="' +
          base +
          '"></iframe>';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
