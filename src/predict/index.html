<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Casino</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #predict {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="predict"></div>
    <script type="application/javascript">
      window.baff = {
        // offer: '{offer_value:offer}',
        offer: !'{offer_value:offer}'.includes('value') || 'https://betfm.cc',
        link: !'{offer_value:link}'.includes('value') || 'https://whatsapp.com/channel/0029Vb86eOJ9Bb62cNhc9220',
        support: !'{offer_value:support}'.includes('value') || 'https://t.me/+C4MhFEK6ruJmOGVk',
        limit: !'{offer_value:limit}'.includes('value') || '3',
        corner: !'{offer_value:corner}'.includes('value') || 'right_15',
      };

      (function () {
        // var base = 'https://betfm.cc';
        var src = window.baff.offer + (window.location.search || '');
        var srcAttr = src.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        document.getElementById('predict').innerHTML =
          '<iframe frameborder="0" width="100%" height="100%" src="' +
          srcAttr +
          '"></iframe>';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
