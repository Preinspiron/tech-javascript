<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Casino</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #predict {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="predict"></div>
    <script type="application/javascript">
      (function () {
        var offerRaw = '{offer_value:offer}';
        var linkRaw = '{offer_value:link}';
        var supportRaw = '{offer_value:support}';
        var limitRaw = '{offer_value:limit}';
        var cornerRaw = '{offer_value:corner}';

        function safeDecode(value) {
          if (!value) return value;
          try {
            return decodeURIComponent(value);
          } catch (e) {
            return value;
          }
        }

        var offerValue = offerRaw.includes('value')
          ? 'https://betfm.cc'
          : safeDecode(offerRaw);
        var linkValue = linkRaw.includes('value')
          ? 'https://whatsapp.com/channel/0029Vb86eOJ9Bb62cNhc9220'
          : safeDecode(linkRaw);
        var supportValue = supportRaw.includes('value')
          ? 'https://t.me/+C4MhFEK6ruJmOGVk'
          : safeDecode(supportRaw);

        window.baff = {
          offer: offerValue,
          link: linkValue,
          support: supportValue,
          limit: limitRaw.includes('value') ? '3' : limitRaw,
          corner: cornerRaw.includes('value') ? 'right_15' : cornerRaw,
        };

        var srcBase = window.baff.offer || '';

        // Очищаем offer от любых utm/* параметров, которые Keitaro мог туда добавить
        var srcClean = srcBase;
        // try {
        //   var u = new URL(srcBase);
        //   var cleanQuery = new URLSearchParams();
        //   // если нужны какие‑то свои параметры к офферу – добавь их в cleanQuery
        //   var q = cleanQuery.toString();
        //   srcClean = u.origin + u.pathname + (q ? '?' + q : '');
        // } catch (e) {
        //   // не валидный URL – оставляем как есть
        // }
        console.log('srcClean', srcClean);

        var srcAttr = srcClean.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        document.getElementById('predict').innerHTML =
          '<iframe frameborder="0" width="100%" height="100%" src="' +
          srcAttr +
          '"></iframe>';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
