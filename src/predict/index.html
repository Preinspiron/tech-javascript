<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Casino</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #predict {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="predict"></div>
    <script type="application/javascript">
      (function () {
        var raw = '{{{queryJson}}}' || '{}';
        var qObj;
        try {
          qObj = JSON.parse(raw);
        } catch (e) {
          qObj = {};
        }
        var offerRaw = '{offer_value:offer}';
        var linkRaw = '{offer_value:link}';
        var supportRaw = '{offer_value:support}';
        var limitRaw = '{offer_value:limit}';
        var cornerRaw = '{offer_value:corner}';
        function safeDecode(value) {
          if (!value) return value;
          try {
            return decodeURIComponent(value);
          } catch (e) {
            return value;
          }
        }
        var offerValue = offerRaw.includes('value')
          ? 'https://betfm.cc'
          : safeDecode(offerRaw);
        var linkValue = linkRaw.includes('value')
          ? 'https://whatsapp.com/channel/0029Vb86eOJ9Bb62cNhc9220'
          : safeDecode(linkRaw);
        var supportValue = supportRaw.includes('value')
          ? 'https://t.me/+C4MhFEK6ruJmOGVk'
          : safeDecode(supportRaw);
        // собираем query‑строку из объекта qObj
        var mergedParams = new URLSearchParams(qObj).toString();
        var originalOffer =
          offerValue + (mergedParams ? '?' + mergedParams : '');
        window.baff = {
          originalOffer,
          offer: offerValue,
          link: linkValue,
          support: supportValue,
          limit: limitRaw.includes('value') ? '3' : limitRaw,
          corner: cornerRaw.includes('value') ? 'right_15' : cornerRaw,
        };
        document.getElementById('predict').innerHTML =
          '<iframe frameborder="0" width="100%" height="100%" src="' +
          originalOffer +
          '"></iframe>';
      })();
    </script>
    <div id="root"></div>
    <!-- Use the same base as in vite.predict.config.ts so dev/prod behave identically -->
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
