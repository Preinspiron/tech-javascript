<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BAFF Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background: #050816;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 16px;
      }
      .app {
        width: 100%;
        max-width: 420px;
        background: #0b1120;
        border-radius: 16px;
        padding: 16px 16px 20px;
        box-shadow: 0 20px 35px rgba(15, 23, 42, 0.8);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .logo-badge {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, #22c55e, #14b8a6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #020617;
      }
      .logo-title {
        font-weight: 700;
        letter-spacing: 0.08em;
        font-size: 20px;
        text-transform: uppercase;
      }
      .muted {
        font-size: 11px;
        color: #9ca3af;
      }
      .menu-button {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        color: #9ca3af;
        cursor: pointer;
        font-size: 14px;
      }
      .menu-popup {
        position: absolute;
        right: 16px;
        top: 46px;
        background: #020617;
        border-radius: 10px;
        border: 1px solid #1f2937;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.7);
        padding: 6px 0;
        min-width: 140px;
        z-index: 20;
      }
      .menu-item {
        padding: 6px 12px;
        font-size: 12px;
        color: #e5e7eb;
        cursor: pointer;
      }
      .menu-item:hover {
        background: #0b1120;
      }
      .field {
        margin-bottom: 10px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
        color: #9ca3af;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: #020617;
        color: #e5e7eb;
        font-size: 13px;
      }
      input:focus {
        outline: none;
        border-color: #22c55e;
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.4);
      }
      button {
        width: 100%;
        margin-top: 6px;
        padding: 9px 12px;
        border-radius: 999px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #22c55e, #14b8a6);
        color: #020617;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .tabs {
        display: flex;
        gap: 4px;
        margin-top: 14px;
        margin-bottom: 10px;
        overflow-x: auto;
      }
      .tab {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        font-size: 12px;
        white-space: nowrap;
        cursor: pointer;
        color: #9ca3af;
        background: #020617;
      }
      .tab.active {
        border-color: #22c55e;
        color: #ecfdf5;
        background: rgba(34, 197, 94, 0.12);
      }
      .top-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .top-tab {
        flex: 1;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: #020617;
        color: #9ca3af;
      }
      .top-tab.active {
        border-color: #22c55e;
        background: rgba(34, 197, 94, 0.12);
        color: #ecfdf5;
      }
      .periods {
        display: grid;
        gap: 8px;
      }
      .card {
        border-radius: 14px;
        background: radial-gradient(circle at top left, #0f172a, #020617);
        padding: 10px 12px;
        border: 1px solid #1f2937;
      }
      .card-title {
        font-size: 12px;
        font-weight: 600;
        color: #e5e7eb;
        margin-bottom: 4px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin: 2px 0;
        color: #d1d5db;
      }
      .stat-label {
        color: #9ca3af;
      }
      .error {
        margin-top: 6px;
        font-size: 11px;
        color: #f97373;
      }
      .empty {
        margin-top: 10px;
        font-size: 12px;
        color: #6b7280;
      }
      .intro {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        margin-top: 8px;
      }
      .intro-row {
        display: flex;
        gap: 10px;
      }
      .intro-card {
        flex: 1;
        border-radius: 16px;
        padding: 12px;
        background: radial-gradient(circle at top left, #0f172a, #020617);
        border: 1px solid #1f2937;
      }
      .intro-label {
        font-size: 11px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }
      .intro-value {
        font-size: 20px;
        font-weight: 700;
        color: #ecfeff;
      }
      .intro-caption {
        font-size: 11px;
        color: #6b7280;
        margin-top: 2px;
      }
      .intro-center {
        text-align: center;
        font-size: 13px;
        color: #e5e7eb;
      }
      .intro-link {
        color: #22c55e;
        font-weight: 600;
        text-decoration: none;
      }
      .intro-link:hover {
        text-decoration: underline;
      }
      .intro-image {
        margin: 8px auto 0;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #1f2937;
        width: 50%;
        max-width: 200px;
      }
      .intro-image img {
        display: block;
        width: 100%;
        height: auto;
      }
      .key-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .key-input {
        flex: 1;
      }
      .reset-btn {
        width: auto;
        padding: 7px 10px;
        font-size: 11px;
        border-radius: 999px;
        background: #020617;
        color: #9ca3af;
        border: 1px solid #1f2937;
      }
      .reset-btn:hover {
        border-color: #22c55e;
        color: #ecfdf5;
      }
      .menu-section-title {
        padding: 4px 12px;
        font-size: 11px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .history-empty {
        padding: 6px 12px;
        font-size: 11px;
        color: #6b7280;
      }
      .history-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 40;
      }
      .history-modal {
        width: 100%;
        max-width: 420px;
        max-height: 80vh;
        background: #020617;
        border-radius: 16px;
        border: 1px solid #1f2937;
        padding: 12px 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .history-title {
        font-size: 13px;
        font-weight: 600;
      }
      .history-close {
        font-size: 18px;
        cursor: pointer;
        color: #9ca3af;
      }
      .history-list {
        overflow-y: auto;
        padding-top: 4px;
      }
      .history-item {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .history-item-main {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 12px;
        color: #e5e7eb;
      }
      .history-meta {
        font-size: 11px;
        color: #9ca3af;
      }
      .history-copy-btn {
        min-width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        background: #020617;
        color: #9ca3af;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .history-item:hover {
        border-color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="logo">
          <div class="logo-badge">B</div>
          <div>
            <div class="logo-title">BAFF Stats</div>
            <div class="muted">Mini stats dashboard</div>
          </div>
        </div>
        <button type="button" class="menu-button" id="menuButton">⋮</button>
        <div
          id="menuPopup"
          class="menu-popup"
          style="display: none"
        >
          <div class="menu-item" id="menuHome">Home</div>
          <div class="menu-item" id="menuHistory">History</div>
          <div class="menu-item" id="menuSupport">BAFF support</div>
        </div>
      </div>

      <div id="introScreen" style="display: none">
        <div class="intro">
          <div class="intro-row">
            <div class="intro-card">
              <div class="intro-label">FTD TODAY</div>
              <div class="intro-value" id="ftdTodayValue">0</div>
              <div class="intro-caption">Growing towards 10,000</div>
            </div>
            <div class="intro-card">
              <div class="intro-label">FTD YEAR</div>
              <div class="intro-value" id="ftdYearValue">0</div>
              <div class="intro-caption">Target: 1,000,000</div>
            </div>
          </div>
          <div class="intro-center">
            Need help?&nbsp;
            <a
              href="https://t.me/+C4MhFEK6ruJmOGVk"
              class="intro-link"
              target="_blank"
              rel="noopener noreferrer"
              >BAFF support</a
            >
          </div>
          <div class="intro-image">
            <img src="snoop.webp" alt="BAFF" />
          </div>
          <button id="introContinueBtn">Continue</button>
        </div>
      </div>

      <div id="mainScreen" style="display: none">
        <div class="top-tabs">
          <button
            type="button"
            class="top-tab active"
            id="offersTab"
          >
            Offers
          </button>
          <button
            type="button"
            class="top-tab"
            id="companiesTab"
          >
            Companies
          </button>
        </div>

        <div id="offersPanel">
          <div class="field">
            <label for="offerKey">Offer key</label>
            <div class="key-row">
              <input
                id="offerKey"
                class="key-input"
                type="text"
                placeholder="Paste offer key"
                autocomplete="off"
              />
              <button type="button" class="reset-btn" id="resetOfferKeyBtn">
                Reset
              </button>
            </div>
          </div>
        </div>

        <div id="companiesPanel" style="display: none">
          <div class="field">
            <label for="companyKey">Company key</label>
            <div class="key-row">
              <input
                id="companyKey"
                class="key-input"
                type="text"
                placeholder="Paste company key"
                autocomplete="off"
              />
              <button type="button" class="reset-btn" id="resetCompanyKeyBtn">
                Reset
              </button>
            </div>
          </div>
        </div>

        <div id="error" class="error" style="display: none"></div>

        <div id="content" style="display: none">
          <div class="tabs" id="tabs"></div>
          <div class="periods" id="periods"></div>
        </div>

        <div id="empty" class="empty">
          Enter key and tap "Load stats".
        </div>
      </div>
      <div class="history-overlay" id="historyOverlay">
        <div class="history-modal">
          <div class="history-header">
            <div class="history-title">Keys history</div>
            <div class="history-close" id="historyClose">×</div>
          </div>
          <div class="history-list" id="historyList"></div>
        </div>
      </div>
    </div>

    <script>
      const SUPPORT_URL = 'https://t.me/+C4MhFEK6ruJmOGVk';

      const introScreen = document.getElementById('introScreen');
      const mainScreen = document.getElementById('mainScreen');
      const ftdTodayValue = document.getElementById('ftdTodayValue');
      const ftdYearValue = document.getElementById('ftdYearValue');
      const introContinueBtn = document.getElementById('introContinueBtn');

      const offersTab = document.getElementById('offersTab');
      const companiesTab = document.getElementById('companiesTab');
      const offersPanel = document.getElementById('offersPanel');
      const companiesPanel = document.getElementById('companiesPanel');

      const offerInput = document.getElementById('offerKey');
      const companyInput = document.getElementById('companyKey');

      const tabsEl = document.getElementById('tabs');
      const periodsEl = document.getElementById('periods');
      const errorEl = document.getElementById('error');
      const contentEl = document.getElementById('content');
      const emptyEl = document.getElementById('empty');
      const menuButton = document.getElementById('menuButton');
      const menuPopup = document.getElementById('menuPopup');
      const menuHome = document.getElementById('menuHome');
      const menuHistory = document.getElementById('menuHistory');
      const menuSupport = document.getElementById('menuSupport');
      const historyOverlay = document.getElementById('historyOverlay');
      const historyList = document.getElementById('historyList');
      const historyClose = document.getElementById('historyClose');
      const resetOfferKeyBtn = document.getElementById('resetOfferKeyBtn');
      const resetCompanyKeyBtn = document.getElementById('resetCompanyKeyBtn');

      let state = {
        mode: 'offers', // 'offers' | 'companies'
        offers: [],
        companies: [],
        activeOfferId: null,
        activeCompanyId: null,
        currentLabel: null,
      };

      const STORAGE_KEYS = {
        offerKey: 'baff_offer_key',
        companyKey: 'baff_company_key',
        history: 'baff_keys_history',
      };

      function saveKeyToStorage(type, key, label) {
        try {
          if (type === 'offer') {
            localStorage.setItem(STORAGE_KEYS.offerKey, key);
          } else if (type === 'company') {
            localStorage.setItem(STORAGE_KEYS.companyKey, key);
          }

          // history
          const raw = localStorage.getItem(STORAGE_KEYS.history) || '[]';
          const list = JSON.parse(raw);
          const now = new Date().toISOString();
          const item = { type, key, label: label || null, ts: now };
          const filtered = list.filter((x) => x.key !== key);
          filtered.unshift(item);
          const limited = filtered.slice(0, 20);
          localStorage.setItem(
            STORAGE_KEYS.history,
            JSON.stringify(limited),
          );
        } catch (e) {
          // ignore storage errors
        }
      }

      function loadInitialKeys() {
        try {
          const offerKey = localStorage.getItem(STORAGE_KEYS.offerKey) || '';
          const companyKey =
            localStorage.getItem(STORAGE_KEYS.companyKey) || '';
          if (offerKey) {
            offerInput.value = offerKey;
          }
          if (companyKey) {
            companyInput.value = companyKey;
          }
        } catch (e) {
          // ignore
        }
      }

      function formatBlock(title, s) {
        const spendInt = Math.round(s.spent);
        const r2d = Math.round(s.regToDepSalePercent);
        const uniq2conv = Math.round(s.uniqueToConvPercent);
        const costPerConv = s.costPerConversion.toFixed(2);
        const costPerDep = s.costPerDepSale.toFixed(2);

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="card-title">${title}</div>
          <div class="stat-row"><span class="stat-label">Clicks</span><span>${s.clicks}</span></div>
          <div class="stat-row"><span class="stat-label">Uniques</span><span>${s.uniques}</span></div>
          <div class="stat-row"><span class="stat-label">spend</span><span>$${spendInt}</span></div>
          <div class="stat-row"><span class="stat-label">regs</span><span>${s.regs}</span></div>
          <div class="stat-row"><span class="stat-label">deps</span><span>${s.depositsSalesCount}</span></div>
          <div class="stat-row"><span class="stat-label">r2d</span><span>${r2d}%</span></div>
          <div class="stat-row"><span class="stat-label">uniq2conv</span><span>${uniq2conv}%</span></div>
          <div class="stat-row"><span class="stat-label">cost per conversion</span><span>${costPerConv}$</span></div>
          <div class="stat-row"><span class="stat-label">cost per deposit</span><span>${costPerDep}$</span></div>
        `;
        return card;
      }

      function render() {
        const items =
          state.mode === 'offers' ? state.offers : state.companies;

        if (!items.length) {
          contentEl.style.display = 'none';
          emptyEl.style.display = 'block';
          return;
        }
        contentEl.style.display = 'block';
        emptyEl.style.display = 'none';

        if (state.mode === 'offers' && !state.activeOfferId && items[0]) {
          state.activeOfferId = items[0].offerId;
        }
        if (state.mode === 'companies' && !state.activeCompanyId && items[0]) {
          state.activeCompanyId = items[0].companyId;
        }

        tabsEl.innerHTML = '';

        if (state.mode === 'offers') {
          items.forEach((o) => {
            const tab = document.createElement('button');
            tab.type = 'button';
            tab.className =
              'tab' + (o.offerId === state.activeOfferId ? ' active' : '');
            const name = o.offerName || '';
            tab.textContent = name
              ? `${o.offerId} | ${name}`
              : `Offer ${o.offerId}`;
            tab.onclick = () => {
              state.activeOfferId = o.offerId;
              render();
            };
            tabsEl.appendChild(tab);
          });
        } else {
          items.forEach((c) => {
            const tab = document.createElement('button');
            tab.type = 'button';
            tab.className =
              'tab' +
              (c.companyId === state.activeCompanyId ? ' active' : '');
            const name = c.all.companyName || '';
            tab.textContent = name
              ? `${c.companyId} | ${name}`
              : `Company ${c.companyId}`;
            tab.onclick = () => {
              state.activeCompanyId = c.companyId;
              render();
            };
            tabsEl.appendChild(tab);
          });
        }

        let active;
        if (state.mode === 'offers') {
          active = items.find((o) => o.offerId === state.activeOfferId);
        } else {
          active = items.find((c) => c.companyId === state.activeCompanyId);
        }

        if (!active) return;

        periodsEl.innerHTML = '';
        periodsEl.appendChild(formatBlock('All time', active.all));
        periodsEl.appendChild(formatBlock('Yesterday', active.yesterday));
        periodsEl.appendChild(formatBlock('Today', active.today));

      }

      async function loadOfferStats() {
        const raw = (offerInput.value || '').trim();
        if (!raw) {
          errorEl.textContent = 'Enter offer key.';
          errorEl.style.display = 'block';
          return;
        }
        errorEl.style.display = 'none';

        try {
          const params = new URLSearchParams({ key: raw });
          const res = await fetch(`/bot/offer-key-stat?${params.toString()}`);
          if (!res.ok) {
            throw new Error('Request failed: ' + res.status);
          }
          const data = await res.json();
          state.mode = 'offers';
          state.offers = data.offers || [];
          state.currentLabel = data.label || null;
          state.activeOfferId = null;
          saveKeyToStorage('offer', raw, data.label || null);
          render();
        } catch (e) {
          errorEl.textContent = 'Failed to load offer stats. Please check key.';
          errorEl.style.display = 'block';
        }
      }

      async function loadCompanyStats() {
        const raw = (companyInput.value || '').trim();
        if (!raw) {
          errorEl.textContent = 'Enter company key.';
          errorEl.style.display = 'block';
          return;
        }
        errorEl.style.display = 'none';

        try {
          const params = new URLSearchParams({ key: raw });
          const res = await fetch(
            `/bot/company-key-stat?${params.toString()}`,
          );
          if (!res.ok) {
            throw new Error('Request failed: ' + res.status);
          }
          const data = await res.json();
          state.mode = 'companies';
          state.companies = data.companies || [];
          state.currentLabel = data.label || null;
          state.activeCompanyId = null;
          saveKeyToStorage('company', raw, data.label || null);
          render();
        } catch (e) {
          errorEl.textContent =
            'Failed to load company stats. Please check key.';
          errorEl.style.display = 'block';
        }
      }

      function showIntroOrMain() {
        const seen = localStorage.getItem('baff_intro_seen') === '1';
        if (seen) {
          introScreen.style.display = 'block';
          mainScreen.style.display = 'block';
          startIntroAnimation();
        } else {
          introScreen.style.display = 'block';
          mainScreen.style.display = 'none';
          startIntroAnimation();
        }
      }

      function startIntroAnimation() {
        animateValue(ftdTodayValue, 0, 10000, 2000);
        animateValue(ftdYearValue, 500000, 1000000, 2200);
      }

      function animateValue(el, start, end, duration) {
        const startTime = performance.now();
        function frame(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const value = Math.round(start + (end - start) * progress);
          el.textContent = value.toLocaleString('en-US');
          if (progress < 1) {
            requestAnimationFrame(frame);
          }
        }
        requestAnimationFrame(frame);
      }

      introContinueBtn.addEventListener('click', () => {
        localStorage.setItem('baff_intro_seen', '1');
        introScreen.style.display = 'none';
        mainScreen.style.display = 'block';
      });

      offersTab.addEventListener('click', () => {
        state.mode = 'offers';
        offersTab.classList.add('active');
        companiesTab.classList.remove('active');
        offersPanel.style.display = 'block';
        companiesPanel.style.display = 'none';
        render();
      });

      companiesTab.addEventListener('click', () => {
        state.mode = 'companies';
        companiesTab.classList.add('active');
        offersTab.classList.remove('active');
        offersPanel.style.display = 'none';
        companiesPanel.style.display = 'block';
        render();
      });

      offerInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          loadOfferStats();
        }
      });

      companyInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          loadCompanyStats();
        }
      });

      resetOfferKeyBtn.addEventListener('click', () => {
        offerInput.value = '';
        try {
          localStorage.removeItem(STORAGE_KEYS.offerKey);
        } catch (e) {}
      });

      resetCompanyKeyBtn.addEventListener('click', () => {
        companyInput.value = '';
        try {
          localStorage.removeItem(STORAGE_KEYS.companyKey);
        } catch (e) {}
      });

      menuButton.addEventListener('click', () => {
        const isVisible = menuPopup.style.display === 'block';
        menuPopup.style.display = isVisible ? 'none' : 'block';
      });

      window.addEventListener('click', (e) => {
        if (
          e.target !== menuButton &&
          !menuPopup.contains(e.target)
        ) {
          menuPopup.style.display = 'none';
          historyOverlay.style.display = 'none';
        }
      });

      menuSupport.addEventListener('click', () => {
        window.open(SUPPORT_URL, '_blank');
        menuPopup.style.display = 'none';
      });

      function renderHistoryIntoMenu() {
        const raw = localStorage.getItem(STORAGE_KEYS.history) || '[]';
        let list;
        try {
          list = JSON.parse(raw);
        } catch (e) {
          list = [];
        }

        historyList.innerHTML = '';

        if (!list.length) {
          const empty = document.createElement('div');
          empty.className = 'history-empty';
          empty.textContent = 'No keys yet';
          historyList.appendChild(empty);
          return;
        }

        list.forEach((item) => {
          const el = document.createElement('div');
          el.className = 'history-item';
          const typeLabel = item.type === 'company' ? 'Company' : 'Offer';
          const main = document.createElement('div');
          main.className = 'history-item-main';
          main.innerHTML = `<div>${item.key}</div><div class="history-meta">${typeLabel}${
            item.label ? ` • ${item.label}` : ''
          }</div>`;

          main.addEventListener('click', async () => {
            // применить ключ сразу
            if (item.type === 'offer') {
              offerInput.value = item.key;
              await loadOfferStats();
              state.mode = 'offers';
              offersTab.classList.add('active');
              companiesTab.classList.remove('active');
              offersPanel.style.display = 'block';
              companiesPanel.style.display = 'none';
            } else {
              companyInput.value = item.key;
              await loadCompanyStats();
              state.mode = 'companies';
              companiesTab.classList.add('active');
              offersTab.classList.remove('active');
              offersPanel.style.display = 'none';
              companiesPanel.style.display = 'block';
            }
            menuPopup.style.display = 'none';
            historyOverlay.style.display = 'none';
          });

          const copyBtn = document.createElement('button');
          copyBtn.type = 'button';
          copyBtn.className = 'history-copy-btn';
          copyBtn.textContent = '⧉';
          copyBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            try {
              await navigator.clipboard.writeText(item.key);
            } catch (err) {
              // ignore
            }
          });

          el.appendChild(main);
          el.appendChild(copyBtn);
          historyList.appendChild(el);
        });
      }

      menuHome.addEventListener('click', () => {
        // Переход к самому первому экрану с анимацией и табами
        introScreen.style.display = 'block';
        mainScreen.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        menuPopup.style.display = 'none';
        historyOverlay.style.display = 'none';
      });

      menuHistory.addEventListener('click', () => {
        renderHistoryIntoMenu();
        historyOverlay.style.display = 'flex';
        menuPopup.style.display = 'none';
      });

      historyClose.addEventListener('click', () => {
        historyOverlay.style.display = 'none';
      });

      historyOverlay.addEventListener('click', (e) => {
        if (e.target === historyOverlay) {
          historyOverlay.style.display = 'none';
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        loadInitialKeys();
        showIntroOrMain();
        // авто‑загрузка, если ключ уже есть
        const offerKey = (offerInput.value || '').trim();
        const companyKey = (companyInput.value || '').trim();
        if (offerKey) {
          loadOfferStats();
        } else if (companyKey) {
          state.mode = 'companies';
          companiesTab.classList.add('active');
          offersTab.classList.remove('active');
          offersPanel.style.display = 'none';
          companiesPanel.style.display = 'block';
          loadCompanyStats();
        }
      });
    </script>
  </body>
</html>
